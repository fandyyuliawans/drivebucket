<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDrive All - Cloud Storage Multi-Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="login-screen" class="hidden min-h-screen flex items-center justify-center bg-blue-600">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full text-center">
            <h1 class="text-2xl font-bold text-blue-600 mb-2">MyDrive All</h1>
            <p class="text-gray-500 mb-6 text-sm">Masuk untuk mengelola penyimpanan.</p>
            
            <input type="email" id="admin-email" placeholder="Email Admin" class="w-full mb-3 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
            <input type="password" id="admin-password" placeholder="Password" class="w-full mb-4 p-3 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
            <button id="btn-login-admin" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2.5 px-4 rounded-lg transition mb-4">
                Masuk sebagai Admin
            </button>
            
            <div class="flex items-center my-4">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">ATAU</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <button id="btn-login" class="w-full bg-blue-50 hover:bg-blue-100 text-blue-600 font-semibold py-2.5 px-4 rounded-lg transition border border-blue-200">
                Masuk dengan Google
            </button>
        </div>
    </div>

    <div id="dashboard-screen" class="min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 bg-white border-r border-gray-200 p-6 flex flex-col justify-between">
            <div>
                <div class="flex items-center space-x-2 mb-8">
                    <div class="bg-blue-600 text-white p-2 rounded-lg font-bold text-xl">☁️</div>
                    <span class="text-xl font-bold text-blue-600">MyDrive All</span>
                </div>
                <nav class="space-y-2">
                    <button onclick="switchTab('mydrive')" class="w-full text-left hover:bg-gray-50 text-gray-700 font-medium py-2.5 px-4 rounded-lg flex items-center space-x-3 focus:bg-blue-50 focus:text-blue-600">
                        <span>🏠</span> <span>My Drive</span>
                    </button>
                    <button onclick="switchTab('kelola')" class="w-full text-left text-gray-700 hover:bg-gray-50 font-medium py-2.5 px-4 rounded-lg flex items-center space-x-3 focus:bg-blue-50 focus:text-blue-600">
                        <span>⚙️</span> <span>Kelola Drive</span>
                    </button>
                </nav>
            </div>
            <button id="btn-logout" class="text-left text-red-500 hover:bg-red-50 py-2.5 px-4 rounded-lg mt-auto flex items-center space-x-3">
                <span>🚪</span> <span>Keluar</span>
            </button>
        </aside>

        <main class="flex-1 p-6 md:p-10">
            
            <div id="my-drive-section">
                <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm"><span class="text-gray-400 text-sm block mb-1">Total File</span><span id="stat-total-file" class="text-2xl font-bold text-gray-800">0</span></div>
                    <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm"><span class="text-gray-400 text-sm block mb-1">Total Ukuran</span><span id="stat-total-size" class="text-2xl font-bold text-gray-800">0 KB</span></div>
                    <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm"><span class="text-gray-400 text-sm block mb-1">Drive Aktif</span><span id="stat-drive-aktif" class="text-2xl font-bold text-gray-800">0</span></div>
                    <div class="bg-white p-5 rounded-xl border border-blue-100 shadow-sm bg-blue-50"><span class="text-blue-500 text-sm block mb-1">Storage Bebas</span><span id="stat-storage-bebas" class="text-2xl font-bold text-blue-600">0 GB</span></div>
                </section>

                <div class="flex space-x-4 mb-8">
                    <label class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium shadow-sm cursor-pointer transition">
                        ➕ Upload File Baru <input type="file" id="input-upload" class="hidden">
                    </label>
                    <button id="btn-tambah-storage" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-lg font-medium shadow-sm transition">
                        🚀 + Tambah Storage (Google Account)
                    </button>
                </div>
                <section class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
                    
                    <div class="flex flex-col md:flex-row justify-between items-center mb-4 space-y-3 md:space-y-0">
                        <h2 class="text-lg font-bold text-gray-800">FILE TERBARU</h2>
                        <div class="flex space-x-2 w-full md:w-auto">
                            <input type="text" id="search-file" placeholder="🔍 Cari nama file..." class="w-full md:w-48 p-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                            <select id="sort-file" class="p-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                                <option value="terbaru">Terbaru</option>
                                <option value="terlama">Terlama</option>
                                <option value="terbesar">Terbesar</option>
                                <option value="terkecil">Terkecil</option>
                                <option value="az">A - Z</option>
                            </select>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-gray-200 text-gray-400 text-sm">
                                    <th class="pb-3 font-medium">Nama File</th>
                                    <th class="pb-3 font-medium">Ukuran</th>
                                    <th class="pb-3 font-medium">Bucket Storage</th>
                                    <th class="pb-3 font-medium text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="table-files-body">
                                </tbody>
                        </table>
                    </div>

                </section>
            </div>

            <div id="kelola-drive-section" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Kelola Drive Storage</h2>
                </div>
                <div id="grid-kelola-drives" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>
            </div>

        </main>
    </div>
    <div id="loading-overlay" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 z-50 flex flex-col items-center justify-center transition-opacity">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <h2 class="text-xl font-bold text-white mb-2">Mengunggah File...</h2>
        <p class="text-blue-200 text-sm">Mohon jangan tutup halaman ini.</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
